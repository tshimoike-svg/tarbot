name: Phase 1 週次レポート送信

# 金曜 6:00 AM JST (= UTC 木曜 21:00) にレポートをメールと LINE へ送信
on:
  schedule:
    - cron: '0 21 * * 4'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: uv セットアップ
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 依存パッケージをインストール
        run: uv sync

      - name: 週次レポートを送信
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          REPORT_TO_EMAIL: ${{ secrets.REPORT_TO_EMAIL }}
        run: uv run python scripts/weekly_report.py
