name: Phase 1 日次シグナルスキャン

# 平日 7:40 AM JST に自動実行
# 手動実行: GitHub → Actions → Run workflow でも起動可能
#
# 時刻の根拠:
#   - US 市場クローズ＆データ settle（夏時間で US 引け ≒ 5:00 JST）より後。
#   - 東京寄り付き 9:00 JST より前（T+1 寄りでの行動が間に合う）。
#   - 毎時0分は GitHub スケジュールの混雑帯でドロップされやすいので :40 へずらす。
# 注意: cron の曜日・時刻は UTC 基準。JST 月〜金 7:40 = UTC 日〜木 22:40。
#       曜日に '1-5' を使うと JST 月曜が発火せず土曜が空振りするため '0-4'。
on:
  schedule:
    - cron: '40 22 * * 0-4'   # UTC 日〜木 22:40 = JST 月〜金 7:40
  workflow_dispatch:

permissions:
  contents: write   # forward_signals.sqlite をコミットするために必要

jobs:
  scan:
    runs-on: ubuntu-latest
    # 初回（コールド）は J-Quants 180 銘柄を 13 秒間隔＋429リトライで取得するため
    # 90 分では足りずタイムアウト → キャッシュ未保存 → 毎回コールドの悪循環に陥っていた。
    # 一度完走してキャッシュ（data/db/daily_scan_cache）が温まれば差分取得で数十秒に収まる。
    #
    # タイムアウトはスキャン「ステップ」側に置く（下記 345 分）。ジョブ単位で
    # タイムアウトすると job が cancel され、if: always() の通知ステップまで
    # skip されてしまう（cancel ≠ failure）。ステップ単位なら "失敗" 扱いになり
    # 後続の通知ステップが走る。ここはハードな上限のバックストップに留める。
    timeout-minutes: 355

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: uv セットアップ
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 依存パッケージをインストール
        run: uv sync

      - name: J-Quants 日足キャッシュを復元
        uses: actions/cache@v4
        with:
          path: data/db/daily_scan_cache
          # run_id ベースのキーで毎回新規保存、前回のキャッシュから差分更新
          key: jquants-bars-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            jquants-bars-${{ runner.os }}-

      - name: S&P500 キャッシュを復元
        uses: actions/cache@v4
        with:
          path: data/db/us_spx_cache
          key: us-spx-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            us-spx-${{ runner.os }}-

      - name: シグナルスキャン実行
        # ステップ単位のタイムアウト。超過するとこのステップが "失敗" になり、
        # ジョブ cancel と違って後続の通知ステップ（if: always()）が走る。
        timeout-minutes: 345
        env:
          JQUANTS_API_KEY: ${{ secrets.JQUANTS_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: uv run python scripts/daily_scan.py --all-configs

      - name: forward_signals.sqlite をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f data/db/forward_signals.sqlite ]; then
            git add data/db/forward_signals.sqlite
            git diff --cached --quiet || git commit -m "chore: forward signals $(date -u +%Y-%m-%d)"
            git push
          else
            echo "forward_signals.sqlite が存在しないためコミットをスキップ（週末 or シグナルなし）"
          fi

      - name: 実行結果をプッシュ通知（成否どちらも）
        # 成功・失敗・ステップタイムアウトのいずれでも必ず1通送る（無音を防ぐ死活監視）。
        # シグナル本体の通知はスクリプト側（send_signal_alert）が別途送る。
        # curl のみ・Python 非依存なのでスキャンが落ちても確実に飛ぶ。
        # 注意: ジョブが cancel された場合（手動キャンセル等）は always でも skip される。
        if: always()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="daily_scan OK"; PRIO="default"; TAGS="white_check_mark"
          else
            TITLE="daily_scan FAILED ($JOB_STATUS)"; PRIO="high"; TAGS="warning"
          fi
          MSG="run #$RUN_NUMBER  status=$JOB_STATUS
          $RUN_URL"
          # ntfy（ASCII タイトルなのでヘッダAPIでエンコード問題なし）
          if [ -n "$NTFY_TOPIC" ]; then
            curl -s -H "Title: $TITLE" -H "Priority: $PRIO" -H "Tags: $TAGS" \
              -d "$MSG" "https://ntfy.sh/$NTFY_TOPIC" || true
          fi
          # Telegram
          if [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            curl -s "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
              --data-urlencode "chat_id=$TELEGRAM_CHAT_ID" \
              --data-urlencode "text=$TITLE
          $MSG" || true
          fi
